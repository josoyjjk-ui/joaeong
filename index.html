<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 조애옹</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --surface: rgba(255,220,160,0.06);
    --surface-hover: rgba(255,220,160,0.11);
    --border: rgba(255,200,120,0.12);
    --border-hover: rgba(255,160,60,0.45);
    --accent: #FF9A3C;
    --accent2: #FFCE7A;
    --text: #F5ECD7;
    --text-dim: #A89070;
    --text-muted: #6B5540;
    --glow: rgba(255,154,60,0.15);
    --radius: 18px;
    --radius-sm: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 파티클 캔버스 */
  canvas#paws {
    position: fixed; top:0; left:0;
    width:100%; height:100%;
    z-index:0; pointer-events:none;
    opacity: 0.18;
  }

  .wrap {
    position: relative; z-index:1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: center;
    padding: 18px 0;
    position: sticky; top:0; z-index:10;
    background: rgba(26,18,8,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-family: 'Gamja Flower', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 56px 0 36px;
  }
  .hero-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .hero h1 {
    font-family: 'Gamja Flower', sans-serif;
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .hero p {
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.7;
  }

  /* SECTION */
  .section { margin-top: 44px; }
  .section-title {
    font-family: 'Gamja Flower', sans-serif;
    font-size: 1.3rem;
    color: var(--accent2);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* PROFILE CARD */
  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .profile-item {
    display: flex; flex-direction: column; gap: 4px;
  }
  .profile-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .profile-value {
    font-size: 0.92rem;
    color: var(--text);
    font-weight: 600;
  }

  /* GALLERY */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .gallery-item {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    position: relative;
  }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: var(--radius-sm);
  }
  .gallery-item:hover {
    border-color: var(--border-hover);
    background: var(--surface-hover);
    transform: scale(1.02);
    box-shadow: 0 6px 24px var(--glow);
  }
  .gallery-placeholder {
    font-size: 2rem;
    pointer-events: none;
  }
  .gallery-placeholder-text {
    font-size: 0.65rem;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* GUESTBOOK */
  .guestbook-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }
  .guestbook-box p {
    color: var(--text-dim);
    font-size: 0.88rem;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .btn {
    display: inline-block;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent), #e07820);
    color: #fff;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
    border: none; cursor: pointer;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--glow); }

  /* FOOTER */
  footer {
    text-align: center;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  /* ── LIGHTBOX ── */
  #lb-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.9);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #lb-overlay.open { display: flex; }
  #lb-img {
    max-width: 90vw; max-height: 80vh;
    border-radius: 12px;
    object-fit: contain;
    user-select: none;
  }
  #lb-close {
    position: absolute; top: 20px; right: 24px;
    background: rgba(255,255,255,0.1);
    border: none; color: #fff;
    font-size: 1.6rem; width: 44px; height: 44px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #lb-close:hover { background: rgba(255,255,255,0.2); }
  .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: none; color: #fff;
    font-size: 1.6rem; width: 48px; height: 48px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lb-arrow:hover { background: rgba(255,255,255,0.25); }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  #lb-counter {
    position: absolute; bottom: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 0.78rem;
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 1.8rem; }
    .profile-card { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<canvas id="paws"></canvas>

<div class="wrap">

  <!-- NAV -->
  <nav><span class="brand">🐱 조애옹</span></nav>

  <!-- HERO -->
  <div class="hero">
    <span class="hero-emoji">🐾</span>
    <h1>조애옹의 세계에<br>오신 걸 환영합니다</h1>
    <p>세상에서 제일 귀여운 고양이, 조애옹의 공식 팬 홈페이지입니다.<br>조애옹의 일상과 사진을 여기서 만나보세요 🧡</p>
  </div>

  <!-- PROFILE -->
  <div class="section">
    <div class="section-title">😸 조애옹 프로필</div>
    <div class="profile-card">
      <div class="profile-item">
        <span class="profile-label">이름</span>
        <span class="profile-value">조애옹</span>
      </div>
      <div class="profile-item">
        <span class="profile-label">종류</span>
        <span class="profile-value">코리안 숏헤어 🐯</span>
      </div>
      <div class="profile-item">
        <span class="profile-label">특기</span>
        <span class="profile-value">귀여운 짓</span>
      </div>
      <div class="profile-item">
        <span class="profile-label">좋아하는 것</span>
        <span class="profile-value">간식 · 낮잠 · 햇볕</span>
      </div>
      <div class="profile-item">
        <span class="profile-label">싫어하는 것</span>
        <span class="profile-value">목욕 😤</span>
      </div>
      <div class="profile-item">
        <span class="profile-label">좌우명</span>
        <span class="profile-value">냥냥냥</span>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="section">
    <div class="section-title">📸 갤러리</div>
    <div class="gallery-grid" id="gallery">
      <div class="gallery-item" data-src="photos/joaeong-1.jpg">
        <img src="photos/joaeong-1.jpg" alt="조애옹 1">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-2.jpg">
        <img src="photos/joaeong-2.jpg" alt="조애옹 2">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-3.jpg">
        <img src="photos/joaeong-3.jpg" alt="조애옹 3">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-4.jpg">
        <img src="photos/joaeong-4.jpg" alt="조애옹 4">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-5.jpg">
        <img src="photos/joaeong-5.jpg" alt="조애옹 5">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-6.jpg">
        <img src="photos/joaeong-6.jpg" alt="조애옹 6">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-7.jpg">
        <img src="photos/joaeong-7.jpg" alt="조애옹 7">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-8.jpg">

      </div>
      <div class="gallery-item" data-src="photos/joaeong-9.jpg">
        <img src="photos/joaeong-9.jpg" alt="조애옹 9">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-10.jpg">
        <img src="photos/joaeong-10.jpg" alt="조애옹 10">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-11.jpg">
        <img src="photos/joaeong-11.jpg" alt="조애옹 11">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-12.jpg">
        <img src="photos/joaeong-12.jpg" alt="조애옹 12">
      </div>
      <div class="gallery-item" data-src="photos/joaeong-13.jpg">
        <img src="photos/joaeong-13.jpg" alt="조애옹 13">

  <!-- VIDEO -->
  <div class="section">
    <div class="section-title">🎬 영상</div>
    <div style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--surface);">
      <video controls playsinline preload="metadata"
        style="width:100%;display:block;border-radius:var(--radius);max-height:420px;background:#000;">

  <!-- GUESTBOOK -->
  <div class="section">

    <div class="guestbook-box">
      <p>조애옹에게 응원 메시지를 남겨주세요!<br>조애옹이 읽을 수도 있어요 (아마도 🐾)</p>

  <!-- FOOTER -->
  <footer>
    <p>Made with 🧡 for 조애옹</p>
    <p style="margin-top:6px;">© 2026 조애옹 팬클럽</p>

</div>

<!-- LIGHTBOX -->
<div id="lb-overlay">
  <button id="lb-close">✕</button>
  <button class="lb-arrow" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="조애옹">
  <button class="lb-arrow" id="lb-next">›</button>
  <div id="lb-counter"></div>
</div>

<script>
// ── 발바닥 파티클 ──
(function() {
  var c = document.getElementById('paws');
  var ctx = c.getContext('2d');
  var W, H, particles = [];
  function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 18; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      size: 10 + Math.random()*16,
      speed: 0.3 + Math.random()*0.5,
      opacity: 0.3 + Math.random()*0.5,
      emoji: ['🐾','🐱','✨'][Math.floor(Math.random()*3)]
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(function(p) {
      ctx.font = p.size + 'px serif';
      ctx.globalAlpha = p.opacity;
      ctx.fillText(p.emoji, p.x, p.y);
      p.y -= p.speed;
      if (p.y < -40) { p.y = H + 20; p.x = Math.random()*W; }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── 라이트박스 ──
(function() {
  var overlay = document.getElementById('lb-overlay');
  var lbImg   = document.getElementById('lb-img');
  var lbPrev  = document.getElementById('lb-prev');
  var lbNext  = document.getElementById('lb-next');
  var lbClose = document.getElementById('lb-close');
  var lbCounter = document.getElementById('lb-counter');
  var images = [], cur = 0;

  function open(idx) {
    images = [];
    document.querySelectorAll('.gallery-item').forEach(function(el) {
      var src = el.dataset.src;
      var img = el.querySelector('img');
      if (img) src = img.src;
      if (src) images.push(src);
    });
    if (!images.length) return;
    cur = idx < images.length ? idx : 0;
    show();
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function show() {
    lbImg.src = images[cur];
    lbCounter.textContent = (cur+1) + ' / ' + images.length;
    lbPrev.style.display = images.length > 1 ? '' : 'none';
    lbNext.style.display = images.length > 1 ? '' : 'none';
  }

  function close() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  lbClose.addEventListener('click', close);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
  lbPrev.addEventListener('click', function(e) { e.stopPropagation(); cur = (cur-1+images.length)%images.length; show(); });
  lbNext.addEventListener('click', function(e) { e.stopPropagation(); cur = (cur+1)%images.length; show(); });
  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') { cur = (cur-1+images.length)%images.length; show(); }
    if (e.key === 'ArrowRight') { cur = (cur+1)%images.length; show(); }
  });

  // 갤러리 클릭 바인딩
  document.querySelectorAll('.gallery-item').forEach(function(el, i) {
    el.addEventListener('click', function() {
      var src = el.dataset.src;
      var img = el.querySelector('img');
      if (img) src = img.src;
      if (src) open(i);
    });
  });
})();
</script>
</body>
</html>
